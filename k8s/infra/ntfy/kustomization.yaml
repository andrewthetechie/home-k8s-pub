apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: ntfy

resources:
  - namespace.yaml
  - postgres.yaml
  - sealedsecret-ntfy-keys.yaml

helmCharts:
  - name: app-template
    releaseName: ntfy
    namespace: ntfy
    version: 4.3.0
    repo: https://bjw-s-labs.github.io/helm-charts
    valuesFile: values.yaml
    kubeVersion: "1.28.1"
