githubConfigUrl: https://github.com/andrewthetechie/lawncare-saas
githubConfigSecret: arc-github-app

minRunners: 0
maxRunners: 2

runnerScaleSetName: lawncare-saas

# DinD gives each runner pod its own Docker daemon, required for jobs that
# build images or use docker/docker-compose steps.
containerMode:
  type: "dind"

# Explicitly reference the controller SA so the chart can create RoleBindings
# when the controller is in a different namespace (arc-systems).
# SA name follows the pattern: {controllerReleaseName}-gha-rs-controller (chart truncates the name)
controllerServiceAccount:
  namespace: arc-systems
  name: arc-controller-gha-rs-controller
