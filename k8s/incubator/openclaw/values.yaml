controllers:
  openclaw:
    strategy: RollingUpdate
    containers:
      gateway:
        image:
          repository: ghcr.io/andrewthetechie/openclaw
          tag: latest
          pullPolicy: IfNotPresent
        env:
          DISCORD_BOT_TOKEN:
            valueFrom:
              secretKeyRef:
                name: openclaw-secrets
                key: DISCORD_BOT_TOKEN
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"

      # git-sync:
      #   image:
      #     repository: registry.k8s.io/git-sync/git-sync
      #     tag: v4.4.0
      #     pullPolicy: IfNotPresent
      #   args:
      #     - "--repo=git@github.com:andrewthetechie/heart-of-the-claw.git"
      #     - "--root=/config-sync"
      #     - "--period=21600s"
      #     - "--one-time=false"
      #   resources:
      #     requests:
      #       memory: "64Mi"
      #       cpu: "50m"
      #     limits:
      #       memory: "128Mi"
      #       cpu: "100m"

  litellm:
    strategy: RollingUpdate
    containers:
      proxy:
        image:
          repository: ghcr.io/berriai/litellm
          tag: main-latest
          pullPolicy: IfNotPresent
        args:
          - "--config"
          - "/app/config.yaml"
          - "--port"
          - "4000"
        ports:
          - containerPort: 4000
            name: proxy
        env:
          ZAI_API_KEY:
            valueFrom:
              secretKeyRef:
                name: openclaw-secrets
                key: ZAI_API_KEY
          NVIDIA_NIM_API_KEY:
            valueFrom:
              secretKeyRef:
                name: openclaw-secrets
                key: NVIDIA_NIM_API_KEY
          VERCEL_AI_API_KEY:
            valueFrom:
              secretKeyRef:
                name: openclaw-secrets
                key: VERCEL_AI_API_KEY
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"

service:
  openclaw:
    controller: openclaw
    ports:
      gateway:
        port: 18789
  litellm:
    controller: litellm
    ports:
      proxy:
        port: 4000

ingress:
  litellm:
    enabled: true
    className: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      gethomepage.dev/enabled: "false"
    hosts:
      - host: litellm.herrington.services
        paths:
          - path: /
            service:
              identifier: litellm
              port: proxy
    tls:
      - secretName: litellm-tls
        hosts:
          - litellm.herrington.services
  openclaw:
    enabled: true
    className: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      gethomepage.dev/enabled: "false"
    hosts:
      - host: openclaw.herrington.services
        paths:
          - path: /
            service:
              identifier: openclaw
              port: gateway
    tls:
      - secretName: openclaw-tls
        hosts:
          - openclaw.herrington.services

persistence:
  # NFS volume for OpenClaw config — SOUL.md, openclaw.json, skills
  openclaw-config:
    type: nfs
    server: chrisjen.herrington.services
    path: /mnt/data_pool/openclaw-config
    advancedMounts:
      openclaw:
        gateway:
          - path: /home/openclaw/.openclaw

  # LiteLLM config from ConfigMap
  litellm-config:
    type: configMap
    name: litellm-config
    advancedMounts:
      litellm:
        proxy:
          - path: /app/config.yaml
            subPath: config.yaml
