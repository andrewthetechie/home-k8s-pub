apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: openclaw

resources:
  - namespace.yaml
  - sentinel-config.yaml

helmCharts:
  - name: app-template
    releaseName: openclaw
    namespace: openclaw
    version: 4.3.0
    repo: https://bjw-s-labs.github.io/helm-charts
    valuesFile: values.yaml
