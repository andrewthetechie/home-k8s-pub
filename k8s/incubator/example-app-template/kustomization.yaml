apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: example-app-template

resources:
  - namespace.yaml

helmCharts:
  - name: app-template
    releaseName: example-app-template
    namespace: example-app-template
    version: 4.3.0
    repo: https://bjw-s-labs.github.io/helm-charts
    valuesFile: values.yaml
