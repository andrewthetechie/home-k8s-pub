apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/instance: tdarr
    app.kubernetes.io/name: tdarr
  name: tdarr-lb
  namespace: tdarr
spec:
  externalTrafficPolicy: Local
  ipFamilies:
  - IPv4
  ipFamilyPolicy: SingleStack
  ports:
  - name: server
    port: 8266
    protocol: TCP
    targetPort: server
  selector:
    app.kubernetes.io/instance: tdarr
    app.kubernetes.io/name: tdarr
  sessionAffinity: None
  type: LoadBalancer
status:
  loadBalancer: {}
