controllers:
  manifest:
    strategy: RollingUpdate
    replicas: 1
    containers:
      app:
        image:
          repository: manifestdotbuild/manifest
          tag: "5.47.0"
          pullPolicy: IfNotPresent
        env:
          - name: MANIFEST_PG_USER
            valueFrom:
              secretKeyRef:
                name: manifest-owner-user.manifest-db.credentials.postgresql.acid.zalan.do
                key: username
          - name: MANIFEST_PG_PASSWORD
            valueFrom:
              secretKeyRef:
                name: manifest-owner-user.manifest-db.credentials.postgresql.acid.zalan.do
                key: password
          - name: DATABASE_URL
            value: postgresql://$(MANIFEST_PG_USER):$(MANIFEST_PG_PASSWORD)@manifest-db.manifest/manifest?sslmode=require
          - name: NODE_ENV
            value: production
          - name: PORT
            value: "3001"
          - name: BIND_ADDRESS
            value: "0.0.0.0"
          - name: AUTO_MIGRATE
            value: "true"
          - name: BETTER_AUTH_URL
            value: "https://manifest.herrington.services"
          - name: BETTER_AUTH_SECRET
            valueFrom:
              secretKeyRef:
                name: manifest-auth
                key: BETTER_AUTH_SECRET
        probes:
          liveness:
            enabled: false
          readiness:
            enabled: false
          startup:
            enabled: false

service:
  manifest:
    controller: manifest
    ports:
      http:
        port: 3001

ingress:
  manifest:
    enabled: true
    className: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      gethomepage.dev/description: LLM routing and observability dashboard
      gethomepage.dev/enabled: "true"
      gethomepage.dev/group: AI
      gethomepage.dev/icon: mdi-graph-outline
      gethomepage.dev/name: Manifest
      gethomepage.dev/weight: "5"
      uptimekuma.io/monitor: "true"
      uptimekuma.io/name: "Manifest"
      uptimekuma.io/type: "http"
      uptimekuma.io/interval: "120"
    hosts:
      - host: manifest.herrington.services
        paths:
          - path: /
            service:
              identifier: manifest
              port: http
    tls:
      - secretName: manifest-tls
        hosts:
          - manifest.herrington.services
