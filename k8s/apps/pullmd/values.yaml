controllers:
  pullmd:
    strategy: RollingUpdate
    containers:
      app:
        image:
          repository: ghcr.io/aeternalabshq/pullmd
          tag: 1.1.3
          pullPolicy: IfNotPresent
        env:
          TZ: America/Chicago
          PUBLIC_URL: "https://pullmd.herrington.services"
          TRAFILATURA_URL: "http://pullmd-trafilatura:8001/extract"
          PLAYWRIGHT_URL: "http://pullmd-playwright:8002/render"

  trafilatura:
    strategy: RollingUpdate
    containers:
      app:
        image:
          repository: ghcr.io/aeternalabshq/pullmd-trafilatura
          tag: 1.1.3
          pullPolicy: IfNotPresent

  playwright:
    strategy: RollingUpdate
    containers:
      app:
        image:
          repository: ghcr.io/aeternalabshq/pullmd-playwright
          tag: 1.1.3
          pullPolicy: IfNotPresent
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "2000m"

service:
  pullmd:
    controller: pullmd
    ports:
      http:
        port: 3000
  trafilatura:
    controller: trafilatura
    ports:
      http:
        port: 8001
  playwright:
    controller: playwright
    ports:
      http:
        port: 8002

ingress:
  pullmd:
    enabled: true
    className: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      gethomepage.dev/enabled: "false"
    hosts:
      - host: pullmd.herrington.services
        paths:
          - path: /
            service:
              identifier: pullmd
              port: http
    tls:
      - secretName: pullmd-tls
        hosts:
          - pullmd.herrington.services

persistence:
  data:
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    size: 50Gi
    storageClass: freenas-iscsi-ssd-csi
    advancedMounts:
      pullmd:
        app:
          - path: /data
