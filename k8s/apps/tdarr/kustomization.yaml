apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: tdarr

# Tdarr stores Options + node worker state in SQLite on the tdarr-data PVC. A new DB
# defaults transcodeWorkerLimit/healthcheckWorkerLimit to 0 and can give every node
# schedule hour transcodecpu/healthcheckcpu=0, so queues never drain. Raise worker
# limits in the UI (Options tab + Nodes tab per docs.tdarr.io/docs/nodes/workers/).

resources:
  - namespace.yaml
  - service-lb.yaml
  # Scales independently of Helm Deployment/tdarr; replicas default 0 (scale when ready).
  - tdarr-node-worker.yaml

helmCharts:
  - name: tdarr
    releaseName: tdarr
    namespace: tdarr
    version: 5.4.0
    repo: https://k8s-home-lab.github.io/helm-charts/
    valuesInline:
      image:
        tag: "2.62.01"
      node:
        enabled: true
        image:
          repository: haveagitgat/tdarr_node
          tag: "2.62.01"
        resources:
          requests:
            cpu: "2"
            memory: 4Gi
          limits:
            cpu: "2"
            memory: 4Gi
      env:
        TZ: "America/Chicago"
        # Bundled Jellyfin FFmpeg in tdarr_node; empty env renders as <nil> and breaks transcodes.
        ffmpegPath: "/app/Tdarr_Node/assets/app/ffmpeg/linux_x64/ffmpeg"
      persistence:
        config:
          enabled: true
          type: pvc
          mountPath: /config
          storageClass: freenas-iscsi-ssd-csi
          accessMode: ReadWriteOnce
          size: 50Gi
        # Server DB, libraries, and most UI state live here; without this PVC
        # everything under /app/server is ephemeral and is lost on pod restart.
        data:
          enabled: true
          type: pvc
          mountPath: /app/server
          storageClass: freenas-iscsi-ssd-csi
          accessMode: ReadWriteOnce
          size: 50Gi
        shared:
          enabled: true
          type: emptyDir
          mountPath: /shared
        tv:
          enabled: true
          type: nfs
          server: duarte.herrington.services
          path: /mnt/Media/TV
          mountPath: /tv
        movies:
          enabled: true
          type: nfs
          server: duarte.herrington.services
          path: /mnt/Media/Movies
          mountPath: /movies
      ingress:
        main:
          enabled: true
          annotations:
            cert-manager.io/cluster-issuer: letsencrypt-prod
            gethomepage.dev/description: Transcode media
            gethomepage.dev/enabled: "true"
            gethomepage.dev/group: Media
            gethomepage.dev/icon: tdarr
            gethomepage.dev/name: tdarr
            gethomepage.dev/weight: "99"
            uptimekuma.io/monitor: "true"
            uptimekuma.io/name: "tdarr"
            uptimekuma.io/type: "http"
            uptimekuma.io/interval: "120"
            nginx.ingress.kubernetes.io/proxy-body-size: "0"
            nginx.org/client-max-body-size: "0"
          hosts:
            - host: tdarr.herrington.services
              paths:
                - path: /
                  pathType: Prefix
          tls:
            - secretName: tdarr-tls
              hosts:
                - tdarr.herrington.services

patches:
  # Chart sets serverIP=localhost; Node resolves that to ::1 while Tdarr_Server
  # listens on IPv4 only, so the node gets ECONNREFUSED on ::1:8266.
  - target:
      kind: Deployment
      name: tdarr
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/1/env/2/value
        value: "127.0.0.1"
  - target:
      kind: Deployment
      name: tdarr
    patch: |-
      - op: add
        path: /spec/template/spec/containers/1/volumeMounts/-
        value:
          name: tv
          mountPath: /tv
  - target:
      kind: Deployment
      name: tdarr
    patch: |-
      - op: add
        path: /spec/template/spec/containers/1/volumeMounts/-
        value:
          name: movies
          mountPath: /movies
