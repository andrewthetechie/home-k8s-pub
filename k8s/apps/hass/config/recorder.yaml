db_url: !secret psql_string
db_retry_wait: 15 # Wait 15 seconds before retrying
# Batch commits (default 5s). 0 commits every flush and explodes WAL/state_attributes churn.
commit_interval: 30
db_max_open_conns: 5
db_max_idle_conns: 2
auto_purge: true
auto_repack: true
# 90d is fine if purge runs and writes are batched (commit_interval); monitor DB size and tighten excludes if needed.
purge_keep_days: 90
exclude:
  domains:
    - automation
    - updater
    - device_tracker
    - media_player
    - uptime
    - time_date
    - worldclock
  entity_globs:
    - sensor.weather_*
    - sensor.clock*
    - sensor.date*
    - sensor.glances*
    - sensor.load_*m
    - sensor.time*
    - sensor.uptime*
  entities:
    - sun.sun # Don't record sun data
    - sensor.last_boot # Comes from 'systemmonitor' sensor platform
    - sensor.date
    - camera.front_door
    - sensor.home_assistant_v2_db
    - sensor.memory_free
    - sensor.memory_use
    - sensor.memory_use_percent
    - sensor.processor_use
    - weather.openweathermap
  event_types:
    - call_service # Don't record service calls
