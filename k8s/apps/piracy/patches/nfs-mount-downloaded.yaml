- op: add
  path: /spec/template/spec/volumes/-
  value:
    name: downloads
    nfs:
      server: duarte.herrington.services
      path: /mnt/Media/downloaded
- op: add
  path: /spec/template/spec/containers/0/volumeMounts/-
  value:
    mountPath: /home/andrewthetechie/downloads
    name: downloads
