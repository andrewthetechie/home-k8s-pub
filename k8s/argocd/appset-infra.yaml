---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: infra
  namespace: argocd
spec:
  # Enables Go templating so we can set sync-wave for kyverno-policies (requires Argo CD 2.5+).
  goTemplate: true
  generators:
    - git:
        repoURL: "git@github.com:andrewthetechie/home-k8s.git"
        revision: HEAD
        directories:
          - path: "nauvoo-v2/manifests/infra/*"
  template:
    metadata:
      name: "{{ .path.basename }}"
      annotations:
        # Wave ordering:
        #   0 (default): most infra, including arc-controller (installs ARC CRDs)
        #   1: actions-runner (runner scale set — needs ARC CRDs from arc-controller)
        #      kyverno-policies (needs Kyverno CRDs from kyverno)
        argocd.argoproj.io/sync-wave: '{{ if or (eq .path.basename "kyverno-policies") (eq .path.basename "actions-runner") }}1{{ else }}0{{ end }}'
    spec:
      project: infra
      source:
        repoURL: "git@github.com:andrewthetechie/home-k8s.git"
        targetRevision: HEAD
        path: "nauvoo-v2/manifests/infra/{{ .path.basename }}"
      destination:
        server: https://kubernetes.default.svc
      syncPolicy: 
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - PrunePropagationPolicy=foreground
          - PruneLast=true
          - ServerSideApply=true
          - FailOnSharedResource=true
          - RespectIgnoreDifferences=true
          - SkipDryRunOnMissingResource=true
          - RespectIgnoreDifferences=true
      ignoreDifferences:
        - group: argoproj.io
          kind: Application
          managedFieldsManagers:
            - argocd-server
          jsonPointers:
            - /spec/syncPolicy/automated
        # https://github.com/argoproj/argo-cd/issues/11143#issuecomment-1664144190
        - group: apps
          kind: StatefulSet
          jqPathExpressions:
            - '.spec.volumeClaimTemplates[]?'